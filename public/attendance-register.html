<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de presença de treinamentos - Full Gauge</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  
  <main class="app-shell" style="grid-template-columns: 1fr; justify-items: center; align-items: center; min-height: 80vh;">
    <section class="wizard-panel" style="text-align: center; max-width: 600px;">
      <div class="brand-card" style="margin-bottom: 2rem;">
        <img src="/assets/logo.svg" alt="Full Gauge Controls" class="brand-logo" style="margin-bottom: 1.5rem;">
        <h1 style="color: #fff; margin-bottom: 0;">Registro de Presença</h1>
      </div>

      <form id="attendanceForm" style="text-align: left; background: var(--panel); padding: 2rem; border-radius: 20px; border: 1px solid var(--line-200); box-shadow: var(--shadow-1);">
        <!-- Campo oculto para armazenar o token JWT completo -->
        <input type="hidden" id="jwtToken" name="jwtToken">

        <div class="field-wrap full">
          <p id="userInfo" style="margin-bottom: 1.5rem; font-size: 0.95rem; color: var(--ink-700); display: none;">
            Registrando presença para: <strong id="displayEmail"></strong><br>Turma: <strong id="displayClassId"></strong>
          </p>

          <label style="font-size: 1.1rem; display: block; margin-bottom: 1rem;">Confirmar presença?</label>
          <div class="radio-group">
            <label class="radio-chip">
              <input type="radio" name="attendance" value="Sim" required>
              <span>Sim</span>
            </label>
            <label class="radio-chip">
              <input type="radio" name="attendance" value="Não" required>
              <span>Não</span>
            </label>
          </div>
        </div>

        <div id="formError" style="color: var(--danger); font-size: 0.9rem; margin-top: 1rem; display: none;">
          Link de acesso inválido. Por favor, utilize o link enviado oficialmente.
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
          <button type="submit" class="primary-btn" style="flex: 2;">Confirmar Registro</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('t'); // 't' de token

    const jwtTokenInput = document.getElementById('jwtToken');
    const displayEmail = document.getElementById('displayEmail');
    const userInfo = document.getElementById('userInfo');
    const displayClassId = document.getElementById('displayClassId');
    const attendanceForm = document.getElementById('attendanceForm');
    const formError = document.getElementById('formError');
    const submitBtn = attendanceForm.querySelector('button[type="submit"]');

    let emailForDisplay = null;
    let classIdForDisplay = null;

    if (token) {
      try {
        // Decodifica apenas o payload do JWT para exibir o e-mail
        // O payload é a segunda parte do JWT (entre os pontos)
        const payloadBase64 = token.split('.')[1];
        if (payloadBase64) {
          const decodedPayload = JSON.parse(decodeURIComponent(escape(atob(payloadBase64))));
          emailForDisplay = decodedPayload.email;
          classIdForDisplay = decodedPayload.classId;
        }
      } catch (e) {
        console.error("Erro ao decodificar payload do JWT para exibição:", e);
      }
    }

    if (token && emailForDisplay && classIdForDisplay) {
      jwtTokenInput.value = token; // Armazena o JWT completo
      displayEmail.textContent = emailForDisplay;
      displayClassId.textContent = classIdForDisplay;
      userInfo.style.display = 'block';

      // Limpa a URL visualmente (remove o ?classId=... da barra de endereço)
      const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
      window.history.replaceState({ path: newUrl }, '', newUrl);
    } else {
      // Se não houver token ou o e-mail não puder ser extraído, desabilita o formulário
      submitBtn.disabled = true;
      formError.style.display = 'block';
    }

    // Lógica visual dos chips de rádio
    document.querySelectorAll('input[name="attendance"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.radio-chip').forEach(chip => {
          chip.classList.toggle('radio-chip--selected', chip.querySelector('input').checked);
        });
      });
    });

    // Lógica de submissão do formulário
    attendanceForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const attendanceValue = attendanceForm.querySelector('input[name="attendance"]:checked')?.value;
      if (!attendanceValue) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="spinner" aria-hidden="true"></span> Enviando...`; // Usar spinner
      const payload = {
        token: jwtTokenInput.value, // Envia o JWT completo
        attendance: attendanceValue
      };

      try {
        const response = await fetch('/api/attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          attendanceForm.innerHTML = '<div style="text-align:center; padding: 2rem;"><h3>✅ Presença registrada!</h3><p>Obrigado por confirmar.</p></div>';
        } else { // Handle API errors
          alert('Erro ao registrar presença. Tente novamente.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Confirmar Registro';
        }
      } catch (err) { // Handle network errors
        alert('Erro de conexão.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Confirmar Registro';
      }
    });
  </script>
</body>
</html>
